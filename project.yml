name: NotchIsland
options:
  bundleIdPrefix: com.notchisland
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  NotchIsland:
    type: application
    platform: macOS
    sources:
      - path: NotchIsland
        excludes:
          - "NotchIsland.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: art.yukosugita.notchisland
        INFOPLIST_FILE: NotchIsland/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotchIsland/NotchIsland.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: QF29DXX9K6

name: NotchIsland
options:
  bundleIdPrefix: com.notchisland
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  NotchIsland:
    type: application
    platform: macOS
    sources:
      - path: NotchIsland
        excludes:
          - "NotchIsland.entitlements"
          - "*.zip"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: art.yukosugita.notchisland
        INFOPLIST_FILE: NotchIsland/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotchIsland/NotchIsland.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: QF29DXX9K6
    postBuildScripts:
      - name: "Bundle MediaHelper"
        script: |
          # Copy framework
          mkdir -p "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          cp -R "${PROJECT_DIR}/MediaHelper/build/MediaHelper.framework" "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" "${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/MediaHelper.framework"
          # Copy perl script
          mkdir -p "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          cp "${PROJECT_DIR}/MediaHelper/bin/media-helper.pl" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/"
